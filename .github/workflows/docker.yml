name: Docker Build and Push Latest

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: agentscope-registry.ap-southeast-1.cr.aliyuncs.com
  IMAGE: agentscope/dojozero

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push multi-arch (latest only)
        run: |
          TAGS="-t ${ACR_REGISTRY}/${IMAGE}:latest -t docker.io/${IMAGE}:latest"
          docker buildx build --platform linux/amd64,linux/arm64 \
            -f docker/allinone.Dockerfile \
            ${TAGS} --push .
