# NFL Game Data Collection Config
#
# Uses the nfl-game trial builder registered via @register_trial_builder
#
# Usage:
#   uv run dojozero run --params configs/nfl-game.yaml

scenario:
  name: nfl-game
  config:
    event_id: '401671827'  # ESPN event ID

    hub:
      persistence_file: outputs/nfl_events.jsonl
      enable_persistence: true

    # NFL-specific data streams (optional - defaults to all event types)
    data_streams:
    - id: nfl_game_initialize_stream
      event_type: nfl_game_initialize
    - id: nfl_game_start_stream
      event_type: nfl_game_start
    - id: nfl_game_result_stream
      event_type: nfl_game_result
    - id: nfl_game_update_stream
      event_type: nfl_game_update
    - id: nfl_play_stream
      event_type: nfl_play
    - id: nfl_drive_stream
      event_type: nfl_drive
    - id: nfl_odds_update_stream
      event_type: nfl_odds_update

    # Optional: Override polling intervals (in seconds)
    # scoreboard_poll_interval: 60
    # summary_poll_interval: 30
    # plays_poll_interval: 10
