# DojoZero Docker Compose Configuration
#
# Usage:
#   1. Copy .env.template to .env and fill in credentials
#   2. docker compose -f deploy/docker-compose.yml up -d
#   3. docker compose -f deploy/docker-compose.yml logs -f
#
# The dashboard server automatically schedules trials for NBA and NFL games
# using the trial source configs in trial_sources/

services:
  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: dojozero-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Ensure Python output is not buffered (for real-time logs)
      - PYTHONUNBUFFERED=1
      # Timezone for scheduling (default: UTC)
      - TZ=${TZ:-UTC}
    volumes:
      # Persist outputs and schedules
      - ../outputs:/app/outputs
      - ../data:/app/data
      # Allow hot-reloading trial source configs (optional)
      - ../trial_sources:/app/trial_sources:ro
      # Schedule state persistence
      - dojozero-schedules:/app/.dojozero
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dojozero-schedules:
    name: dojozero-schedules
