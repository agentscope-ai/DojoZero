# DojoZero Docker Compose Configuration
#
# Usage:
#   1. Copy .env.template to .env and fill in credentials
#   2. docker-compose -f deploy/docker-compose.yml up -d
#   3. docker-compose -f deploy/docker-compose.yml logs -f
#
# Runs two separate containers for NBA and NFL trial sources

services:
  nba:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: dojozero-nba
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
    volumes:
      - ../outputs:/app/outputs
      - ../data:/app/data
      - ../trial_sources:/app/trial_sources:ro
      - dojozero-nba-schedules:/app/.dojozero
    command: >
      dojo0 serve
      --host 0.0.0.0
      --port 8000
      --trace-backend sls
      --oss-backup
      --trial-source trial_sources/nba.yaml
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nfl:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: dojozero-nfl
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
    volumes:
      - ../outputs:/app/outputs
      - ../data:/app/data
      - ../trial_sources:/app/trial_sources:ro
      - dojozero-nfl-schedules:/app/.dojozero
    command: >
      dojo0 serve
      --host 0.0.0.0
      --port 8000
      --trace-backend sls
      --oss-backup
      --trial-source trial_sources/nfl.yaml
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dojozero-nba-schedules:
    name: dojozero-nba-schedules
  dojozero-nfl-schedules:
    name: dojozero-nfl-schedules
