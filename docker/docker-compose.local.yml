# Local Docker Compose (not for Alibaba deploy — see ../deploy/)
#
# Compose project name → container prefix / default network (change if running multiple stacks).
name: dojozero-local
#
# Profiles:
#   trial    — one-shot: dojo0 run
#   serve    — long-running: dojo0 serve (dashboard + scheduling)
#   tracing  — Jaeger v2 single container (use with serve + DOJOZERO_ENABLE_JAEGER=1)
#   arena    — Arena UI + API/WebSocket (needs tracing: Jaeger query on :16686)
#
# Examples (from repo root):
#   docker compose -f docker/docker-compose.local.yml --profile trial run --rm trial
#   docker compose -f docker/docker-compose.local.yml --profile serve up -d --build
#   docker compose -f docker/docker-compose.local.yml --profile serve --profile tracing up -d --build
#   # Dashboard + traces + Arena (build frontend first — see docker/README.md):
#   docker compose -f docker/docker-compose.local.yml --profile serve --profile tracing --profile arena up -d --build

x-build-local: &build-local
  context: ..
  dockerfile: docker/local.Dockerfile

services:
  trial:
    profiles:
      - trial
    build: *build-local
    env_file:
      - ../.env
    environment:
      - DOJOZERO_TRIAL_PARAMS=${DOJOZERO_TRIAL_PARAMS:-trial_params/nba-moneyline.yaml}
      - DOJOZERO_TRIAL_ID=${DOJOZERO_TRIAL_ID:-quickstart-trial}
    volumes:
      - ../outputs:/app/outputs
      - ../data:/app/data
      - ../trial_params:/app/trial_params:ro
      - ../trial_sources:/app/trial_sources:ro
    command: >
      sh -c '
      if [ -z "$$DOJOZERO_DASHSCOPE_API_KEY" ] || [ -z "$$DOJOZERO_TAVILY_API_KEY" ]; then
        echo "Missing required env vars: DOJOZERO_DASHSCOPE_API_KEY and DOJOZERO_TAVILY_API_KEY";
        echo "Please set them in .env before running a trial.";
        exit 1;
      fi;
      echo "Running single trial with params: $$DOJOZERO_TRIAL_PARAMS";
      echo "Trial id: $$DOJOZERO_TRIAL_ID";
      dojo0 run --params "$$DOJOZERO_TRIAL_PARAMS" --trial-id "$$DOJOZERO_TRIAL_ID"
      '

  # Jaeger v1 / jaegertracing/all-in-one is archived (EOL). v2 uses jaegertracing/jaeger.
  # OTLP must bind 0.0.0.0 so other containers (serve) can reach the collector.
  # Ref: https://www.jaegertracing.io/docs/latest/getting-started/
  jaeger:
    image: jaegertracing/jaeger:2.16.0
    profiles:
      - tracing
    command:
      - "--set"
      - "receivers.otlp.protocols.http.endpoint=0.0.0.0:4318"
      - "--set"
      - "receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  serve:
    profiles:
      - serve
    restart: unless-stopped
    build: *build-local
    env_file:
      - ../.env
    ports:
      - "${DOJOZERO_SERVE_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Glob or single file; CLI expands globs (see dojozero.cli _serve_command).
      # DOJOZERO_ENABLE_JAEGER: set in repo-root .env (env_file above), not here — ${VAR} uses docker/ as project dir.
      - DOJOZERO_TRIAL_SOURCE=${DOJOZERO_TRIAL_SOURCE:-trial_sources/*.yaml}
    volumes:
      - ../outputs:/app/outputs
      - ../data:/app/data
      - ../trial_params:/app/trial_params:ro
      - ../trial_sources:/app/trial_sources:ro
      - dojozero-local-schedules:/app/.dojozero
    depends_on:
      jaeger:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: >
      sh -c '
      if [ -z "$$DOJOZERO_DASHSCOPE_API_KEY" ] || [ -z "$$DOJOZERO_TAVILY_API_KEY" ]; then
        echo "Missing required env vars: DOJOZERO_DASHSCOPE_API_KEY and DOJOZERO_TAVILY_API_KEY";
        echo "Please set them in .env before starting the dashboard server.";
        exit 1;
      fi;
      TRACE_ARGS="";
      if [ "$$DOJOZERO_ENABLE_JAEGER" = "1" ]; then
        TRACE_ARGS="--trace-backend jaeger --trace-ingest-endpoint http://jaeger:4318";
      fi;
      exec dojo0 serve --host 0.0.0.0 --port 8000 $$TRACE_ARGS --trial-source "$$DOJOZERO_TRIAL_SOURCE"
      '

  # Arena: trace-backed UI (optional). Mount host-built Vite output at frontend-update/dist.
  # Use with --profile tracing so http://jaeger:16686 (query API) exists.
  arena:
    profiles:
      - arena
    restart: unless-stopped
    build: *build-local
    env_file:
      - ../.env
    ports:
      - "${DOJOZERO_ARENA_PORT:-3001}:3001"
    environment:
      - PYTHONUNBUFFERED=1
      - ARENA_HOST_PORT=${DOJOZERO_ARENA_PORT:-3001}
    volumes:
      - ../frontend-update/dist:/app/arena-static:ro
    depends_on:
      jaeger:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    command: >
      sh -c '
      STATIC_ARGS="";
      if [ -f /app/arena-static/index.html ]; then
        STATIC_ARGS="--static-dir /app/arena-static";
      else
        echo "Arena: no static UI (missing frontend-update/dist/index.html). API/WebSocket still run. Build: cd frontend-update && npm ci && VITE_API_URL=http://localhost:$$ARENA_HOST_PORT npm run build";
      fi;
      exec dojo0 arena --host 0.0.0.0 --port 3001 --trace-backend jaeger --trace-query-endpoint http://jaeger:16686 $$STATIC_ARGS
      '

volumes:
  dojozero-local-schedules:
    name: dojozero-local-schedules
