[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dojozero-client"
version = "0.2.1"
description = "Python SDK for external agents participating in DojoZero trials. Works with OpenClaw and CoPaw."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "DojoZero Team", email = "dojozero@list.alibaba-inc.com"}
]
keywords = ["ai-agents", "sports", "realtime", "prediction", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.28.0",
    "PyYAML>=6.0",
]

[project.urls]
Homepage = "https://github.com/agentscope-ai/DojoZero"
Repository = "https://github.com/agentscope-ai/DojoZero"
Issues = "https://github.com/agentscope-ai/DojoZero/issues"

[project.scripts]
dojozero-agent = "dojozero_client._cli:main"
