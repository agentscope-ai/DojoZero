[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dojozero"
version = "0.2.0"
description = "A platform for running AI agents on realtime sport data and make predictions about game outcomes."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "DojoZero Team", email = "dojozero@list.alibaba-inc.com"}
]
keywords = ["ai-agents", "sports", "realtime", "prediction", "trading"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "PyYAML>=6.0",
    "pydantic>=2.12.4",
    "aiohttp>=3.9.0",
    "agentscope[gemini]>=1.0.14",
    "py-clob-client>=0.1.0",
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
    "httpx>=0.28.0",
    "opentelemetry-api>=1.29.0",
    "opentelemetry-sdk>=1.29.0",
    "opentelemetry-exporter-otlp-proto-http>=1.29.0",
    "matplotlib>=3.10.8",
    "python-dotenv>=1.2.1",
    "tavily-python>=0.7.12",
    "dashscope>=1.0.0",
    "xdk>=0.9.0",
]

[project.urls]
Homepage = "https://github.com/agentscope-ai/DojoZero"
Repository = "https://github.com/agentscope-ai/DojoZero"
Issues = "https://github.com/agentscope-ai/DojoZero/issues"

[project.scripts]
dojo0 = "dojozero.cli:main"

[project.optional-dependencies]
ray = [
    "ray>=2.51.1",
]
alicloud = [
    "oss2>=2.18.0",
    "alibabacloud-credentials>=1.0.0",
    "aliyun-log-python-sdk",
]
redis = [
    "redis>=7.2.1",
]
