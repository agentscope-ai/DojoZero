[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bettingarena"
version = "0.0.0"
description = "A realtime benchmark system for AI agents placing bets using virtual dollars"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "BettingArena Team"}
]
dependencies = [
    "agentscope",
    "agentscope-runtime",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "pyright>=1.1.0",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "pyright>=1.1.0",
]

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.pyright]
pythonVersion = "3.9"
typeCheckingMode = "basic"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
