scenario:
  name: nba
  config:
    espn_game_id: '401810490'  # ESPN game ID - overridden by nba_trial_runner.py

    hub:
      persistence_file: outputs/nba_betting_events.jsonl

    data_streams:
    # Pre-game insights: each event class owns search → LLM → typed event lifecycle
    - id: pre_game_insights_stream
      event_types:
      - injury_report
      - power_ranking
      - expert_prediction

    # ESPN pregame stats (fetched from ESPN API during pregame phase)
    - id: stats_stream
      event_types:
      - pregame_stats

    # Game lifecycle
    - id: game_lifecycle_stream
      event_types:
      - game_initialize
      - game_start
      - game_result

    # Live game data
    - id: game_update_stream
      event_types:
      - espn_game_update

    - id: odds_update_stream
      event_types:
      - odds_update

    - id: play_by_play_stream
      event_types:
      - espn_play

    operators:
    - id: betting_broker
      class: BrokerOperator
      initial_balance: "1000.00"
      allowed_tools:
      - get_balance
      - get_event
      - place_bet_moneyline
      - cancel_bet
      - get_active_bets
      - get_pending_orders
      - get_bet_history
      - get_statistics
      data_streams:
      - game_lifecycle_stream
      - odds_update_stream
      - game_update_stream

    agents:
    - id: degen_agent
      name: degen
      class: BettingAgent
      persona_config_path: agents/personas/degen.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - stats_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: oracle_agent
      name: oracle
      class: BettingAgent
      persona_config_path: agents/personas/oracle.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
        - betting_broker
      data_streams:
        - pre_game_insights_stream
        - stats_stream
        - game_update_stream
        - odds_update_stream
        - game_lifecycle_stream
        - play_by_play_stream
    - id: professor_agent
      name: professor
      class: BettingAgent
      persona_config_path: agents/personas/professor.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
        - betting_broker
      data_streams:
        - pre_game_insights_stream
        - stats_stream
        - game_update_stream
        - odds_update_stream
        - game_lifecycle_stream
        - play_by_play_stream
    - id: shark_agent
      name: shark
      class: BettingAgent
      persona_config_path: agents/personas/shark.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - stats_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: sheep_agent
      name: sheep
      class: BettingAgent
      persona_config_path: agents/personas/sheep.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - stats_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: whale_agent
      name: whale
      class: BettingAgent
      persona_config_path: agents/personas/whale.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - stats_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
