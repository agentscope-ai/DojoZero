scenario:
  name: nba
  config:
    espn_game_id: '401810490'  # ESPN game ID - overridden by nba_trial_runner.py

    hub:
      persistence_file: outputs/nba_betting_events.jsonl

    data_streams:
    - id: raw_web_search_stream
      event_type: raw_web_search
      initializer:
        search_queries:
        - template: NBA injury updates for {teams} on {date}
          intent: injury_summary
        - template: NBA power rankings
          intent: power_ranking
        - template: NBA expert predictions for {teams}
          intent: expert_prediction
    - id: injury_summary_stream
      event_type: injury_summary
    - id: power_ranking_stream
      event_type: power_ranking
    - id: expert_prediction_stream
      event_type: expert_prediction
    - id: game_status_change_stream
      event_type: game_status_change
    - id: game_update_stream
      event_type: game_update
    - id: odds_update_stream
      event_type: odds_update
    - id: play_by_play_stream
      event_type: play_by_play

    operators:
    - id: betting_broker
      class: BrokerOperator
      initial_balance: "1000.00"
      allowed_tools:
      - get_balance
      - place_bet_moneyline
      - cancel_bet
      - get_active_bets
      - get_pending_orders
      - get_bet_history
      - get_statistics
      data_streams:
      - game_status_change_stream
      - odds_update_stream
      - game_update_stream

    agents:
    - id: degen_agent
      name: degen
      class: BettingAgent
      persona_config_path: agents/personas/degen.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - game_update_stream
      - odds_update_stream
      - game_status_change_stream
      - play_by_play_stream
    - id: oracle_agent
      name: oracle
      class: BettingAgent
      persona_config_path: agents/personas/oracle.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
        - betting_broker
      data_streams:
        - injury_summary_stream
        - power_ranking_stream
        - expert_prediction_stream
        - game_update_stream
        - odds_update_stream
        - game_status_change_stream
        - play_by_play_stream
    - id: professor_agent
      name: professor
      class: BettingAgent
      persona_config_path: agents/personas/professor.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
        - betting_broker
      data_streams:
        - injury_summary_stream
        - power_ranking_stream
        - expert_prediction_stream
        - game_update_stream
        - odds_update_stream
        - game_status_change_stream
        - play_by_play_stream
    - id: shark_agent
      name: shark
      class: BettingAgent
      persona_config_path: agents/personas/shark.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - game_update_stream
      - odds_update_stream
      - game_status_change_stream
      - play_by_play_stream
    - id: sheep_agent
      name: sheep
      class: BettingAgent
      persona_config_path: agents/personas/sheep.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - game_update_stream
      - odds_update_stream
      - game_status_change_stream
      - play_by_play_stream
    - id: whale_agent
      name: whale
      class: BettingAgent
      persona_config_path: agents/personas/whale.yaml
      llm_config_path: agents/llms/qwen.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - game_update_stream
      - odds_update_stream
      - game_status_change_stream
      - play_by_play_stream
