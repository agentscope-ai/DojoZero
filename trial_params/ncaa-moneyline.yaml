scenario:
  name: ncaa
  config:
    espn_game_id: 'your_espn_game_id_here'  # ESPN game ID for the NCAA game

    hub:
      persistence_file: outputs/ncaa_betting_events.jsonl

    data_streams:
    # Pre-game insights: each event class owns search → LLM → typed event lifecycle
    - id: pre_game_insights_stream
      event_types:
      - injury_report
      - power_ranking
      - expert_prediction
      - pregame_stats
      - twitter_top_tweets

    # Game lifecycle
    - id: game_lifecycle_stream
      event_types:
      - game_initialize
      - game_start
      - game_result

    # Live game data
    - id: game_update_stream
      event_types:
      - ncaa_game_update

    - id: odds_update_stream
      event_types:
      - odds_update

    - id: play_by_play_stream
      event_types:
      - ncaa_play

    operators:
    - id: betting_broker
      class: BrokerOperator
      initial_balance: "1000.00"
      allowed_tools:
      - get_event
      - get_balance
      - get_holdings
      - place_market_bet_moneyline
      - get_bet_history
      - get_statistics
      data_streams:
      - game_lifecycle_stream
      - odds_update_stream
      - game_update_stream

    agents:
    - id: degen_agent
      persona: degen
      class: BettingAgent
      persona_config_path: agents/personas/degen.yaml
      llm_config_path: agents/llms/default.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: mystic_agent
      persona: mystic
      class: BettingAgent
      persona_config_path: agents/personas/mystic.yaml
      llm_config_path: agents/llms/default.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: pundit_agent
      persona: pundit
      class: BettingAgent
      persona_config_path: agents/personas/pundit.yaml
      llm_config_path: agents/llms/default.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: shark_agent
      persona: shark
      class: BettingAgent
      persona_config_path: agents/personas/shark.yaml
      llm_config_path: agents/llms/default.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: sheep_agent
      persona: sheep
      class: BettingAgent
      persona_config_path: agents/personas/sheep.yaml
      llm_config_path: agents/llms/default.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
    - id: whale_agent
      persona: whale
      class: BettingAgent
      persona_config_path: agents/personas/whale.yaml
      llm_config_path: agents/llms/default.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - game_update_stream
      - odds_update_stream
      - game_lifecycle_stream
      - play_by_play_stream
