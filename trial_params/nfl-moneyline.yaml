scenario:
  name: nfl-moneyline
  config:
    event_id: '401547417'  # Example NFL event ID

    hub:
      persistence_file: outputs/nfl_betting_events.jsonl
      enable_persistence: true

    data_streams:
    - id: raw_web_search_stream
      event_type: raw_web_search
      initializer:
        search_queries:
        - template: NFL injury updates for {teams} on {date}
          intent: injury_summary
        - template: NFL power rankings
          intent: power_ranking
        - template: NFL expert predictions for {teams}
          intent: expert_prediction
    - id: injury_summary_stream
      event_type: injury_summary
    - id: power_ranking_stream
      event_type: power_ranking
    - id: expert_prediction_stream
      event_type: expert_prediction
    - id: nfl_game_status_change_stream
      event_type: nfl_game_status_change
    - id: nfl_game_update_stream
      event_type: nfl_game_update
    - id: nfl_odds_update_stream
      event_type: nfl_odds_update
    - id: nfl_play_stream
      event_type: nfl_play

    operators:
    - id: betting_broker
      class: BrokerOperator
      initial_balance: "1000.00"
      data_streams:
      - nfl_game_status_change_stream
      - nfl_odds_update_stream
      - nfl_game_update_stream
      
    agents:
    - id: basic_agent
      class: BettingAgent
      agent_config_path: agents/basic.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - nfl_game_status_change_stream
      - nfl_play_stream
    - id: shark_agent
      class: BettingAgent
      agent_config_path: agents/shark.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - nfl_game_status_change_stream
      - nfl_play_stream
    - id: sheep_agent
      class: BettingAgent
      agent_config_path: agents/sheep.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - nfl_game_status_change_stream
      - nfl_play_stream
    - id: whale_agent
      class: BettingAgent
      agent_config_path: agents/whale.yaml
      operators:
      - betting_broker
      data_streams:
      - injury_summary_stream
      - power_ranking_stream
      - expert_prediction_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - nfl_game_status_change_stream
      - nfl_play_stream
