scenario:
  name: nfl
  config:
    espn_game_id: '401547417'  # ESPN game ID for the NFL game

    hub:
      persistence_file: outputs/nfl_betting_events.jsonl

    data_streams:
    # Pre-game insights: each event class owns search → LLM → typed event lifecycle
    - id: pre_game_insights_stream
      event_types:
      - injury_report
      - power_ranking
      - expert_prediction

    # Game lifecycle
    - id: game_lifecycle_stream
      event_types:
      - game_initialize
      - game_start
      - game_result

    # Live game data
    - id: nfl_game_update_stream
      event_types:
      - nfl_game_update

    - id: nfl_odds_update_stream
      event_types:
      - odds_update

    - id: nfl_play_stream
      event_types:
      - nfl_play

    operators:
    - id: betting_broker
      class: BrokerOperator
      initial_balance: "1000.00"
      allowed_tools:
      - get_balance
      - get_event
      - place_bet_moneyline
      - cancel_bet
      - get_active_bets
      - get_pending_orders
      - get_bet_history
      - get_statistics
      data_streams:
      - game_lifecycle_stream
      - nfl_odds_update_stream
      - nfl_game_update_stream

    agents:
    - id: basic_agent
      class: BettingAgent
      agent_config_path: agents/basic.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
    - id: shark_agent
      class: BettingAgent
      agent_config_path: agents/shark.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
    - id: sheep_agent
      class: BettingAgent
      agent_config_path: agents/sheep.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
    - id: whale_agent
      class: BettingAgent
      agent_config_path: agents/whale.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
