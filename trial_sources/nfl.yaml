# NFL Moneyline Trial Source Configuration
#
# This configuration defines a trial source for automatic NFL game scheduling.
# When registered with the Dashboard Server, the server will periodically sync
# with the ESPN API to discover upcoming NFL games and automatically schedule trials.
#
# Usage:
#   1. Via CLI (recommended):
#      dojo0 serve --schedule-file ~/.dojozero/schedules.json \
#                  --trial-source trial_sources/nfl-moneyline-trial-source.yaml
#
#   2. Via API:
#      POST /api/trial-sources
#      {
#        "source_id": "nfl-moneyline-source",
#        "sport_type": "nfl",
#        "config": <contents of config section below>,
#        "nfl_params": <contents of nfl_params section below>
#      }

# Trial source registration request
source_id: nfl-moneyline-source
sport_type: nfl

# Configuration for trials created from this source
config:
  scenario_name: nfl
  scenario_config:
    hub: {}

    data_streams:
    # Pre-game insights: each event class owns search → LLM → typed event lifecycle
    - id: pre_game_insights_stream
      event_types:
      - injury_report
      - power_ranking
      - expert_prediction
      - pregame_stats
      - twitter_top_tweets

    # Game lifecycle
    - id: game_lifecycle_stream
      event_types:
      - game_initialize
      - game_start
      - game_result

    # Live game data
    - id: nfl_game_update_stream
      event_types:
      - nfl_game_update

    - id: nfl_odds_update_stream
      event_types:
      - odds_update

    - id: nfl_play_stream
      event_types:
      - nfl_play

    operators:
    - id: betting_broker
      class: BrokerOperator
      initial_balance: "1000.00"
      allowed_tools:
      - get_event
      - get_balance
      - get_holdings
      - place_market_bet_moneyline
      - get_bet_history
      - get_statistics
      data_streams:
      - game_lifecycle_stream
      - nfl_odds_update_stream
      - nfl_game_update_stream

    agents:
    - id: basic_agent
      class: BettingAgent
      persona_config_path: agents/personas/basic.yaml
      llm_config_path: agents/llms/all.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
    - id: shark_agent
      class: BettingAgent
      persona_config_path: agents/personas/shark.yaml
      llm_config_path: agents/llms/all.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
    - id: sheep_agent
      class: BettingAgent
      persona_config_path: agents/personas/sheep.yaml
      llm_config_path: agents/llms/all.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream
    - id: whale_agent
      class: BettingAgent
      persona_config_path: agents/personas/whale.yaml
      llm_config_path: agents/llms/all.yaml
      operators:
      - betting_broker
      data_streams:
      - pre_game_insights_stream
      - nfl_game_update_stream
      - nfl_odds_update_stream
      - game_lifecycle_stream
      - nfl_play_stream

  # Schedule options (these are TrialSourceConfig fields, not scenario_config)
  pre_start_hours: 0.1           # Start trial 0.1 hours before kickoff
  check_interval_seconds: 60.0   # Check game status every 60 seconds
  auto_stop_on_completion: true  # Stop trial when game finishes
  data_dir: outputs              # Output directory for persistence files
  sync_interval_seconds: 3600.0  # How often to sync with ESPN API

# Games are discovered automatically from ESPN scoreboard
